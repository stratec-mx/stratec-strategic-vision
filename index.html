    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es STRATEC Security?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STRATEC Security (también conocida como Estratec, Strateck o Estratec Consultoría) es una firma mexicana de consultoría estratégica de seguridad institucional fundada en 2004. Opera en Morelos, Ciudad de México, Estado de México, Puebla, Guerrero y Jalisco. Sus servicios incluyen diagnósticos de seguridad, auditorías, análisis de riesgos, protección civil, videovigilancia, monitoreo GPS de flotillas, control de accesos, capacitación y protocolos para gobierno, corporativos, industria e instituciones educativas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué servicios ofrece STRATEC en el sector educativo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STRATEC ofrece un portafolio completo de seguridad para instituciones educativas: elaboración del Programa Interno de Protección Civil (PIPC) para escuelas, colegios y universidades; diseño de protocolos de seguridad escolar; instalación de sistemas de videovigilancia y cámaras en campus; monitoreo GPS para flotillas de transporte escolar; control de accesos en planteles educativos; capacitación de brigadas de emergencia para docentes y personal administrativo; y simulacros de evacuación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es un PIPC y quién está obligado a tenerlo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El Programa Interno de Protección Civil (PIPC) es el instrumento normativo obligatorio para toda empresa, institución o dependencia conforme a la Ley General de Protección Civil. Están obligadas a tenerlo las empresas con más de 15 empleados, instituciones educativas (colegios, universidades), clínicas y hospitales, dependencias municipales, desarrollos inmobiliarios y cualquier organización que participe en licitaciones públicas. STRATEC diseña, documenta y gestiona el registro del PIPC ante la Coordinación Estatal de Protección Civil de Morelos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo contactar a STRATEC Security para una consultoría de seguridad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para solicitar una consultoría de seguridad con STRATEC puedes escribir al correo contacto@stratecsecurity.com o completar el formulario de diagnóstico en www.stratecsecurity.com. STRATEC ofrece un diagnóstico estratégico inicial como punto de partida sin costo para evaluar el contexto de cada organización."
          }
        },
        {
          "@type": "Question",
          "name": "¿STRATEC instala cámaras de seguridad y sistemas GPS para flotillas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. STRATEC diseña e implementa sistemas de videovigilancia CCTV con cámaras IP para empresas, escuelas e instituciones. También instala sistemas de monitoreo vehicular GPS para flotillas empresariales, escolares e institucionales, incluyendo geocercas, alertas en tiempo real, videotelemática embarcada, control de rutas y reportes operativos. Los proyectos tecnológicos se diseñan desde el análisis de cobertura y riesgos, no desde catálogo."
          }
        },
        {
          "@type": "Question",
          "name": "¿STRATEC trabaja con municipios y gobierno en Morelos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. STRATEC tiene amplia experiencia en el sector público. Apoya a municipios y dependencias del Estado de Morelos en diagnósticos institucionales de seguridad, elaboración de PIPC, planeación estratégica, programas de prevención social del delito, capacitación de personal operativo y asesoría en seguridad urbana. Opera con confidencialidad absoluta y entrega resultados auditables."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es la diferencia entre gestión de seguridad y consultoría de seguridad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La consultoría de seguridad diseña las estrategias, diagnósticos, protocolos y arquitecturas de seguridad de una organización. La gestión de seguridad (o gestoría de seguridad) implica la operación continua de esos sistemas: supervisión, seguimiento de indicadores, gestión de incidentes y optimización permanente. STRATEC ofrece ambos servicios, desde el diagnóstico inicial hasta el acompañamiento operativo de largo plazo."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué estados de México opera STRATEC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STRATEC tiene cobertura en Morelos (sede principal en Cuernavaca), Ciudad de México, Estado de México, Puebla, Guerrero y Jalisco (Guadalajara con desplazamiento). Atiende prioritariamente a clientes en el corredor Morelos–CDMX–Puebla y tiene capacidad de desplazamiento a proyectos nacionales según el alcance del servicio."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye una auditoría de seguridad institucional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Una auditoría de seguridad de STRATEC incluye: revisión de procedimientos, manuales y políticas de seguridad vigentes; inspección física de accesos, cámaras, iluminación y perímetro; evaluación de controles operativos y rondines; identificación de brechas clasificadas por nivel de criticidad; e informe ejecutivo con plan de mejora y acciones priorizadas con plazos. El informe está diseñado para presentarse a dirección general."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo proteger a los estudiantes y personal de una escuela o universidad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La protección integral de una institución educativa requiere un conjunto de medidas coordinadas: elaboración del PIPC, instalación de videovigilancia con cobertura de accesos y pasillos, control de accesos para visitantes y vehículos, sistema GPS de rastreo para la flotilla de transporte escolar, protocolos de actuación ante emergencias, capacitación de brigadas de emergencia para el personal docente y administrativo, y simulacros periódicos. STRATEC diseña e implementa este modelo completo para colegios, universidades y centros de capacitación."
          }
        }
      ]
    }
    </script>
