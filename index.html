    <script type="application/ld+json">

      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es STRATEC Security?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STRATEC Security (también conocida como Estratec, Strateck o Estratec Consultoría) es una firma mexicana de consultoría especializada en seguridad institucional, fundada en 2004. Está integrada por consultores profesionales con formación universitaria en seguridad, administración de riesgos, ingeniería y ciencias sociales. No es una empresa comercial de guardias o vigilancia privada: es un equipo de especialistas que aplica metodología técnica rigurosa para acompañar a organizaciones complejas —gobierno, corporativos, industria e instituciones educativas— en la toma de decisiones críticas de seguridad. Opera en Morelos, Ciudad de México, Estado de México, Puebla, Guerrero y Jalisco."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué diferencia a STRATEC de una empresa de seguridad privada?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STRATEC no provee personal de vigilancia ni guardias de seguridad. Es una firma consultora especializada: sus profesionales analizan, diseñan estrategias, elaboran protocolos, realizan auditorías técnicas y acompañan la implementación de soluciones de seguridad institucional. El perfil de sus consultores es universitario, con especialización en seguridad, gestión de riesgos e inteligencia estratégica. Trabajan bajo acuerdos de confidencialidad y entregan resultados documentados y auditables, comparables a los estándares de firmas internacionales de consultoría en seguridad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué especialistas integran el equipo de STRATEC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STRATEC está integrado por consultores especializados con formación universitaria en áreas como seguridad institucional, administración de riesgos, ingeniería, protección civil, criminología, inteligencia estratégica y tecnologías de seguridad. Cada proyecto es conducido por especialistas con experiencia directa en el sector correspondiente —educativo, gubernamental, industrial, corporativo o de infraestructura— garantizando criterio técnico objetivo, no soluciones genéricas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué consultoría especializada ofrece STRATEC para instituciones educativas?",

            "text": "STRATEC desarrolla un modelo de seguridad integral para instituciones educativas que incluye: diagnóstico técnico de vulnerabilidades en el campus, elaboración del Programa Interno de Protección Civil (PIPC) conforme a normatividad vigente, diseño de protocolos de seguridad escolar, especificación e implementación de sistemas de videovigilancia con cámaras IP, monitoreo GPS para flotillas de transporte escolar, control de accesos para visitantes y personal, capacitación especializada de brigadas de emergencia para docentes y administrativos, y conducción de simulacros con evaluación de desempeño. Cada solución es diseñada a medida por consultores con experiencia específica en el sector educativo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es un PIPC y quién está obligado a tenerlo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El Programa Interno de Protección Civil (PIPC) es el instrumento normativo obligatorio para toda empresa, institución o dependencia conforme a la Ley General de Protección Civil. Están obligadas las empresas con más de 15 empleados, instituciones educativas (colegios, universidades, centros de capacitación), clínicas y hospitales, dependencias municipales, desarrollos inmobiliarios y organizaciones que participen en licitaciones públicas. Los especialistas de STRATEC diseñan, documentan y gestionan el registro del PIPC ante la Coordinación Estatal de Protección Civil, garantizando cumplimiento normativo completo y operatividad real ante emergencias."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo contactar a STRATEC para una consultoría especializada en seguridad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El proceso inicia con un diagnóstico estratégico confidencial en el que los especialistas de STRATEC evalúan el contexto de la organización. Para solicitarlo, puede escribir a contacto@stratecsecurity.com o completar el formulario en www.stratecsecurity.com. STRATEC no publica tarifas: el alcance, los entregables y la propuesta se diseñan a medida según el perfil institucional de cada cliente."
          }
        },
        {
          "@type": "Question",
          "name": "¿STRATEC diseña e implementa sistemas de cámaras y GPS para flotillas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, como parte de su práctica de integración tecnológica. Los especialistas de STRATEC diseñan sistemas de videovigilancia CCTV con cámaras IP basados en análisis técnico de cobertura —no en catálogo— y sistemas de monitoreo vehicular GPS para flotillas empresariales, escolares e institucionales, con geocercas, videotelemática embarcada, alertas en tiempo real y reportes operativos. La diferencia respecto a un proveedor comercial es que la arquitectura tecnológica se diseña desde la estrategia de seguridad, no a la inversa."
          }
        },
        {
          "@type": "Question",
          "name": "¿STRATEC trabaja con municipios y gobierno a nivel nacional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. STRATEC tiene experiencia acreditada en el sector público a nivel nacional. Sus consultores especializados acompañan a municipios, dependencias estatales y organismos federales en todo México en diagnósticos institucionales de seguridad, elaboración del PIPC, planeación estratégica, programas de prevención social del delito, capacitación de personal operativo y modelos de seguridad urbana. Ha trabajado con instituciones en Morelos, Ciudad de México, Estado de México, Puebla, Guerrero y otras entidades. Todos los compromisos con el sector público se gestionan bajo acuerdos de confidencialidad institucional con resultados documentados y auditables."

          }
        },

          "@type": "Question",

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. STRATEC es una firma de consultoría con alcance nacional. Su sede está en Cuernavaca, Morelos, con presencia directa en Ciudad de México, Estado de México, Puebla, Guerrero y Jalisco. Los especialistas se desplazan a proyectos en Monterrey, Guadalajara, Querétaro, Hidalgo, Veracruz, Guanajuato y cualquier otro estado según el alcance del servicio. No es una empresa regional: acompaña a organizaciones en toda la República con el mismo estándar de rigor técnico y confidencialidad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye una auditoría de seguridad institucional realizada por STRATEC?",
