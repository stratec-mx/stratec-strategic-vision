name: Telegram Bot - STRATEC Posts

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:
  # SIN trigger de push — era la causa del loop infinito:
  # cada commit del bot disparaba un nuevo run, que procesaba
  # los mismos mensajes y volvía a hacer commit, sin fin.

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  poll:
    name: Procesar mensajes
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependencias
        run: npm install sharp

      # Evita race condition: si otro run terminó mientras este esperaba
      # en la cola de concurrencia, el workspace tiene el offset viejo.
      - name: Sincronizar estado
        run: |
          git fetch origin
          git checkout origin/main -- public/social-posts/ 2>/dev/null || true

      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
          FAL_API_KEY:                 ${{ secrets.FAL_API_KEY }}
          LEONARDO_API_KEY:            ${{ secrets.LEONARDO_API_KEY }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          FACEBOOK_PAGE_ACCESS_TOKEN:  ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:            ${{ secrets.FACEBOOK_PAGE_ID }}
          LINKEDIN_ACCESS_TOKEN:       ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID:             ${{ secrets.LINKEDIN_ORG_ID }}
          LINKEDIN_PERSON_URN:         ${{ secrets.LINKEDIN_PERSON_URN }}
        run: node scripts/telegram-bot-poll.mjs

      - name: Guardar estado del bot
        if: always()
        run: |
          git config user.name  "STRATEC Bot"
          git config user.email "bot@stratecsecurity.com"
          OFFSET=$(cat public/social-posts/.telegram-offset 2>/dev/null || echo "")
          mkdir -p /tmp/bot-state/pending
          cp -r public/social-posts/pending/. /tmp/bot-state/pending/ 2>/dev/null || true
          git fetch origin
          git reset --hard origin/main
          # Solo avanzar el offset, nunca retrocederlo
          REMOTE_OFFSET=$(cat public/social-posts/.telegram-offset 2>/dev/null || echo "0")
          if [ -n "$OFFSET" ] && [ "$OFFSET" -gt "$REMOTE_OFFSET" ]; then
            echo "$OFFSET" > public/social-posts/.telegram-offset
          fi
          rm -rf public/social-posts/pending
          mkdir -p public/social-posts/pending
          cp -r /tmp/bot-state/pending/. public/social-posts/pending/ 2>/dev/null || true
          git add public/social-posts/
          git diff --staged --quiet || git commit -m "bot: estado telegram"
          git push
