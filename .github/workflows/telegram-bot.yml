name: Telegram Bot - STRATEC Posts

on:
  # Respaldo cada 5 min (mínimo real de GitHub Actions)
  schedule:
    - cron: "*/5 * * * *"

  # Disparo manual para pruebas
  workflow_dispatch:

  # Auto-encadenamiento: cuando el bot procesa mensajes y actualiza
  # el offset, el push re-dispara el workflow hasta vaciar la cola
  push:
    branches: [main]
    paths:
      - "public/social-posts/.telegram-offset"

# Solo una instancia del bot corre a la vez.
# Si llega un nuevo disparo mientras hay uno activo, espera en cola.
concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  poll:
    name: Procesar mensajes
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependencias
        run: npm install sharp

      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
          LEONARDO_API_KEY:            ${{ secrets.LEONARDO_API_KEY }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          FACEBOOK_PAGE_ACCESS_TOKEN:  ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:            ${{ secrets.FACEBOOK_PAGE_ID }}
          LINKEDIN_ACCESS_TOKEN:       ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID:             ${{ secrets.LINKEDIN_ORG_ID }}
        run: node scripts/telegram-bot-poll.mjs

      # if: always() garantiza que el offset se guarda aunque el bot falle
      - name: Guardar estado del bot
        if: always()
        run: |
          git config user.name  "STRATEC Bot"
          git config user.email "bot@stratecsecurity.com"
          # Snapshot bot state before syncing with remote
          OFFSET=$(cat public/social-posts/.telegram-offset 2>/dev/null || echo "")
          mkdir -p /tmp/bot-state/pending
          cp -r public/social-posts/pending/. /tmp/bot-state/pending/ 2>/dev/null || true
          # Reset to remote (eliminates push conflicts — no rebase needed)
          git fetch origin
          git reset --hard origin/main
          # Restore bot state on top of clean remote
          [ -n "$OFFSET" ] && echo "$OFFSET" > public/social-posts/.telegram-offset
          rm -rf public/social-posts/pending
          mkdir -p public/social-posts/pending
          cp -r /tmp/bot-state/pending/. public/social-posts/pending/ 2>/dev/null || true
          # Commit and push — remote is already synced, so this cannot fail
          git add public/social-posts/
          git diff --staged --quiet || git commit -m "bot: estado telegram"
          git push
