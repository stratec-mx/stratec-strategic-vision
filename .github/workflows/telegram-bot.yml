name: Telegram Bot STRATEC

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    name: Procesar mensajes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar Sharp
        run: npm install sharp
      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          LEONARDO_API_KEY:            ${{ secrets.LEONARDO_API_KEY }}
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_PAGE_ACCESS_TOKEN:  ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:            ${{ secrets.FACEBOOK_PAGE_ID }}
          LINKEDIN_ACCESS_TOKEN:       ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID:             ${{ secrets.LINKEDIN_ORG_ID }}
        run: node scripts/telegram-bot-poll.mjs
      - name: Guardar estado
        run: |
          git config user.name "STRATEC Bot"
          git config user.email "bot@stratecsecurity.com"
          git add public/social-posts/
          git diff --staged --quiet || git commit -m "bot: estado telegram [skip ci]"
          git push
