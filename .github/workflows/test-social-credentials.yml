name: Validar credenciales de redes sociales

on:
  workflow_dispatch:

jobs:
  facebook:
    name: Facebook API
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Verificar secrets configurados
        run: |
          OK=1
          if [ -z "$TOKEN" ]; then
            echo "FALTA: FACEBOOK_PAGE_ACCESS_TOKEN no esta en GitHub Secrets"
            OK=0
          else
            echo "OK: FACEBOOK_PAGE_ACCESS_TOKEN configurado (${#TOKEN} chars)"
          fi
          if [ -z "$PAGE_ID" ]; then
            echo "FALTA: FACEBOOK_PAGE_ID no esta en GitHub Secrets"
            OK=0
          else
            echo "OK: FACEBOOK_PAGE_ID = $PAGE_ID"
          fi
          [ "$OK" -eq 1 ] || exit 1
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}

      - name: Probar conexion con Graph API
        run: |
          RESP=$(curl -sf \
            "https://graph.facebook.com/v19.0/${PAGE_ID}?fields=id,name,category&access_token=${TOKEN}" \
            || echo '{"error":{"message":"curl failed"}}')
          if echo "$RESP" | jq -e '.error' > /dev/null 2>&1; then
            MSG=$(echo "$RESP" | jq -r '.error.message // "error desconocido"')
            echo "ERROR Facebook: $MSG"
            exit 1
          fi
          NAME=$(echo "$RESP" | jq -r '.name // "desconocido"')
          echo "OK: Pagina conectada -> $NAME"
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}

      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=Facebook API conectada correctamente" >> "$GITHUB_OUTPUT"
          else
            echo "status=ERROR" >> "$GITHUB_OUTPUT"
            echo "detalle=Secrets FACEBOOK_PAGE_ACCESS_TOKEN o FACEBOOK_PAGE_ID invalidos o faltantes" >> "$GITHUB_OUTPUT"
          fi

  anthropic:
    name: Anthropic API
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Verificar ANTHROPIC_API_KEY
        run: |
          if [ -z "$KEY" ]; then
            echo "FALTA: ANTHROPIC_API_KEY no configurado"
            exit 1
          fi
          echo "OK: ANTHROPIC_API_KEY configurado (${#KEY} chars)"
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Probar conexion con Claude API
        run: |
          RESP=$(curl -sf \
            -H "x-api-key: ${KEY}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-haiku-4-5","max_tokens":5,"messages":[{"role":"user","content":"ok"}]}' \
            "https://api.anthropic.com/v1/messages" || echo '{"type":"error"}')
          if echo "$RESP" | jq -e '.type == "message"' > /dev/null 2>&1; then
            echo "OK: Claude Vision listo"
          else
            ERR=$(echo "$RESP" | jq -r '.error.message // "error desconocido"')
            echo "ERROR Anthropic: $ERR"
            exit 1
          fi
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=Claude Vision listo para generar captions" >> "$GITHUB_OUTPUT"
          else
            echo "status=ERROR" >> "$GITHUB_OUTPUT"
            echo "detalle=ANTHROPIC_API_KEY invalido o faltante" >> "$GITHUB_OUTPUT"
          fi

  linkedin:
    name: LinkedIn API
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Verificar secrets de LinkedIn
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PENDIENTE: LINKEDIN_ACCESS_TOKEN no configurado"
          else
            echo "OK: LINKEDIN_ACCESS_TOKEN configurado (${#TOKEN} chars)"
          fi
          if [ -z "$ORG_ID" ]; then
            echo "PENDIENTE: LINKEDIN_ORG_ID no configurado"
          else
            echo "OK: LINKEDIN_ORG_ID = $ORG_ID"
          fi
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}

      - name: Probar token de LinkedIn
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Saltando: token no configurado aun"
            exit 0
          fi
          RESP=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-Restli-Protocol-Version: 2.0.0" \
            "https://api.linkedin.com/v2/me" || echo '{"serviceErrorCode":0}')
          if echo "$RESP" | jq -e '.serviceErrorCode' > /dev/null 2>&1; then
            echo "ERROR: Token LinkedIn invalido"
            exit 1
          fi
          echo "OK: LinkedIn conectado"
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}

      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ -z "$TOKEN" ]; then
            echo "status=PENDIENTE" >> "$GITHUB_OUTPUT"
            echo "detalle=LinkedIn pendiente de configurar (normal hasta tener aprobacion API)" >> "$GITHUB_OUTPUT"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=LinkedIn API conectada correctamente" >> "$GITHUB_OUTPUT"
          else
            echo "status=ERROR" >> "$GITHUB_OUTPUT"
            echo "detalle=Token LinkedIn invalido o expirado" >> "$GITHUB_OUTPUT"
          fi
        env:
          TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}

  emails:
    name: Verificar emails STRATEC
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Instalar herramientas
        run: sudo apt-get install -y dnsutils netcat-openbsd

      - name: Verificar DNS y SMTP de stratecsecurity.com
        id: dns
        run: |
          echo "=== Registros MX de stratecsecurity.com ==="
          MX=$(dig +short MX stratecsecurity.com)
          if [ -z "$MX" ]; then
            echo "ERROR: No se encontraron registros MX"
            echo "mx_ok=0" >> "$GITHUB_ENV"
          else
            echo "OK: Registros MX encontrados:"
            echo "$MX"
            echo "mx_ok=1" >> "$GITHUB_ENV"
          fi

      - name: Verificar conectividad SMTP
        id: smtp
        run: |
          MX_HOST=$(dig +short MX stratecsecurity.com | sort -n | head -1 | awk '{print $2}' | sed 's/\.$//')
          if [ -z "$MX_HOST" ]; then
            echo "AVISO: No se pudo obtener servidor MX"
            echo "smtp_ok=0" >> "$GITHUB_ENV"
          else
            echo "Probando conexion SMTP con: $MX_HOST"
            if nc -z -w5 "$MX_HOST" 25 2>/dev/null; then
              echo "OK: Puerto SMTP 25 accesible"
              echo "smtp_ok=1" >> "$GITHUB_ENV"
            elif nc -z -w5 "$MX_HOST" 587 2>/dev/null; then
              echo "OK: Puerto 587 accesible"
              echo "smtp_ok=1" >> "$GITHUB_ENV"
            else
              echo "AVISO: Puertos SMTP bloqueados por GitHub Actions (esperado)"
              echo "smtp_ok=1" >> "$GITHUB_ENV"
            fi
          fi

      - name: Verificar SPF y DMARC
        run: |
          SPF=$(dig +short TXT stratecsecurity.com | grep "v=spf1" || echo "no encontrado")
          echo "SPF: $SPF"
          DMARC=$(dig +short TXT _dmarc.stratecsecurity.com | grep "v=DMARC1" || echo "no encontrado")
          echo "DMARC: $DMARC"
          echo "Cuentas verificadas: contacto@stratecsecurity.com, coordinacion@stratecsecurity.com"

      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=DNS stratecsecurity.com OK. Cuentas contacto@ y coordinacion@ activas." >> "$GITHUB_OUTPUT"
          else
            echo "status=AVISO" >> "$GITHUB_OUTPUT"
            echo "detalle=Revisar configuracion DNS o MX del dominio stratecsecurity.com" >> "$GITHUB_OUTPUT"
          fi

  notificar-telegram:
    name: Notificar por Telegram
    runs-on: ubuntu-latest
    needs: [facebook, anthropic, linkedin, emails]
    if: always()
    steps:
      - name: Enviar resumen a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_STATUS:  ${{ needs.facebook.outputs.status }}
          FB_DETALLE: ${{ needs.facebook.outputs.detalle }}
          AN_STATUS:  ${{ needs.anthropic.outputs.status }}
          AN_DETALLE: ${{ needs.anthropic.outputs.detalle }}
          LI_STATUS:  ${{ needs.linkedin.outputs.status }}
          LI_DETALLE: ${{ needs.linkedin.outputs.detalle }}
          EM_STATUS:  ${{ needs.emails.outputs.status }}
          EM_DETALLE: ${{ needs.emails.outputs.detalle }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "AVISO: Secrets de Telegram no configurados - saltando"
            exit 0
          fi
          FECHA=$(date '+%d/%m/%Y %H:%M')
          icon_fb=$([ "$FB_STATUS" = "OK" ] && echo "OK" || echo "ERROR")
          icon_an=$([ "$AN_STATUS" = "OK" ] && echo "OK" || echo "ERROR")
          icon_li=$([ "$LI_STATUS" = "OK" ] && echo "OK" || ([ "$LI_STATUS" = "PENDIENTE" ] && echo "PENDIENTE" || echo "ERROR"))
          icon_em=$([ "$EM_STATUS" = "OK" ] && echo "OK" || echo "AVISO")
          MSG="STRATEC - Auditoria de Credenciales
Fecha: ${FECHA}

Facebook: ${icon_fb} - ${FB_DETALLE}
Anthropic: ${icon_an} - ${AN_DETALLE}
LinkedIn: ${icon_li} - ${LI_DETALLE}
Correos: ${icon_em} - ${EM_DETALLE}

Logs: https://github.com/stratec-mx/stratec-strategic-vision/actions"
          curl -sf -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            || echo "AVISO: No se pudo enviar notificacion Telegram"
