name: Validar credenciales de redes sociales

on:
  workflow_dispatch:

jobs:
  facebook:
    name: Facebook API
    runs-on: ubuntu-latest
    steps:
      - name: Verificar secrets configurados
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          OK=1
          if [ -z "$TOKEN" ]; then
            echo "FALTA: FACEBOOK_PAGE_ACCESS_TOKEN no esta en GitHub Secrets"
            OK=0
          else
            echo "OK: FACEBOOK_PAGE_ACCESS_TOKEN configurado (${#TOKEN} chars)"
          fi
          if [ -z "$PAGE_ID" ]; then
            echo "FALTA: FACEBOOK_PAGE_ID no esta en GitHub Secrets"
            OK=0
          else
            echo "OK: FACEBOOK_PAGE_ID = $PAGE_ID"
          fi
          [ "$OK" -eq 1 ] || exit 1

      - name: Probar conexion con Graph API
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          RESP=$(curl -sf "https://graph.facebook.com/v19.0/${PAGE_ID}?fields=id,name,category&access_token=${TOKEN}" || echo '{"error":{"message":"curl failed"}}')
          if echo "$RESP" | jq -e '.error' > /dev/null 2>&1; then
            CODE=$(echo "$RESP" | jq -r '.error.code // "?"')
            MSG=$(echo  "$RESP" | jq -r '.error.message // "error desconocido"')
            echo "ERROR Facebook API - Codigo: $CODE"
            echo "Mensaje: $MSG"
            exit 1
          fi
          NAME=$(echo "$RESP" | jq -r '.name // "desconocido"')
          CAT=$( echo "$RESP" | jq -r '.category // "desconocida"')
          echo "OK: Conexion exitosa"
          echo "    Pagina: $NAME"
          echo "    Categoria: $CAT"

      - name: Verificar permisos del token
        env:
          TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          RESP=$(curl -sf "https://graph.facebook.com/v19.0/me/permissions?access_token=${TOKEN}" || echo '{"error":{"message":"curl failed"}}')
          if echo "$RESP" | jq -e '.error' > /dev/null 2>&1; then
            echo "AVISO: No se pudieron verificar permisos (puede ser normal con tokens de pagina)"
            exit 0
          fi
          echo "Permisos activos:"
          echo "$RESP" | jq -r '.data[] | select(.status=="granted") | .permission' | while read P; do
            echo "  - $P"
          done
          for NEEDED in pages_manage_posts pages_read_engagement; do
            if echo "$RESP" | jq -r '.data[] | select(.status=="granted") | .permission' | grep -q "^${NEEDED}$"; then
              echo "OK: $NEEDED presente"
            else
              echo "AVISO: $NEEDED no encontrado (puede estar incluido en el token de pagina)"
            fi
          done

  anthropic:
    name: Anthropic API
    runs-on: ubuntu-latest
    steps:
      - name: Verificar ANTHROPIC_API_KEY
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "FALTA: ANTHROPIC_API_KEY no esta configurado"
            exit 1
          fi
          echo "OK: ANTHROPIC_API_KEY configurado (${#KEY} chars)"

      - name: Probar conexion con Claude API
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESP=$(curl -sf \
            -H "x-api-key: ${KEY}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-haiku-4-5","max_tokens":5,"messages":[{"role":"user","content":"ok"}]}' \
            "https://api.anthropic.com/v1/messages" || echo '{"type":"error"}')
          if echo "$RESP" | jq -e '.type == "message"' > /dev/null 2>&1; then
            echo "OK: Claude API responde correctamente - Vision listo para generar captions"
          else
            ERR=$(echo "$RESP" | jq -r '.error.message // "error desconocido"')
            echo "ERROR Anthropic API: $ERR"
            exit 1
          fi

  linkedin:
    name: LinkedIn API
    runs-on: ubuntu-latest
    steps:
      - name: Verificar secrets de LinkedIn
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PENDIENTE: LINKEDIN_ACCESS_TOKEN no configurado (configura despues de aprobacion)"
          else
            echo "OK: LINKEDIN_ACCESS_TOKEN configurado (${#TOKEN} chars)"
          fi
          if [ -z "$ORG_ID" ]; then
            echo "PENDIENTE: LINKEDIN_ORG_ID no configurado"
          else
            echo "OK: LINKEDIN_ORG_ID = $ORG_ID"
          fi

      - name: Probar token de LinkedIn
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Saltando prueba: token no configurado"
            exit 0
          fi
          RESP=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-Restli-Protocol-Version: 2.0.0" \
            "https://api.linkedin.com/v2/me" || echo '{"serviceErrorCode":0}')
          if echo "$RESP" | jq -e '.serviceErrorCode' > /dev/null 2>&1; then
            echo "ERROR: Token de LinkedIn invalido o sin permisos"
            exit 1
          fi
          NAME=$(echo "$RESP" | jq -r '.localizedFirstName + " " + .localizedLastName' 2>/dev/null || echo "desconocido")
          echo "OK: LinkedIn conectado - Perfil: $NAME"
