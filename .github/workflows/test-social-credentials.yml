name: 🔍 Validar credenciales de redes sociales

# Ejecutar SOLO manualmente desde GitHub → Actions → Run workflow
on:
  workflow_dispatch:

jobs:
  validar-facebook:
    name: Facebook / Meta API
    runs-on: ubuntu-latest
    steps:
      - name: Verificar que el secret existe
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ FACEBOOK_PAGE_ACCESS_TOKEN no está configurado en GitHub Secrets"
            exit 1
          else
            echo "✅ FACEBOOK_PAGE_ACCESS_TOKEN está configurado"
            echo "   Longitud del token: ${#TOKEN} caracteres"
          fi
          if [ -z "$PAGE_ID" ]; then
            echo "❌ FACEBOOK_PAGE_ID no está configurado en GitHub Secrets"
            exit 1
          else
            echo "✅ FACEBOOK_PAGE_ID está configurado: $PAGE_ID"
          fi
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}

      - name: Verificar acceso a la página vía Graph API
        run: |
          RESPONSE=$(curl -s \
            "https://graph.facebook.com/v19.0/${PAGE_ID}?fields=id,name,category&access_token=${TOKEN}")

          # Verificar si hay error
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "❌ Error al conectar con Facebook API:"
            echo "$RESPONSE" | python3 -c "import sys,json; e=json.load(sys.stdin).get('error',{}); print(f'  Código: {e.get(\"code\",\"?\")}'); print(f'  Mensaje: {e.get(\"message\",\"?\")}')"
            exit 1
          fi

          # Mostrar info de la página (sin exponer el token)
          PAGE_NAME=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name','desconocido'))")
          PAGE_CAT=$(echo  "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('category','desconocida'))")
          echo "✅ Conexión exitosa con Facebook API"
          echo "   Página: $PAGE_NAME"
          echo "   Categoría: $PAGE_CAT"
          echo "   ID verificado: $PAGE_ID"
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}

      - name: Verificar permisos del token
        run: |
          RESPONSE=$(curl -s \
            "https://graph.facebook.com/v19.0/me/permissions?access_token=${TOKEN}")

          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "⚠️  No se pudieron verificar los permisos del token"
          else
            echo "✅ Permisos activos en el token:"
            echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
perms = data.get('data', [])
needed = {'pages_manage_posts', 'pages_read_engagement'}
found = set()
for p in perms:
    if p.get('status') == 'granted':
        name = p.get('permission','')
        found.add(name)
        marker = '✅' if name in needed else '  '
        print(f'  {marker} {name}')
missing = needed - found
if missing:
    print()
    for m in missing:
        print(f'  ❌ FALTA: {m}')
    sys.exit(1)
else:
    print()
    print('  ✅ Todos los permisos necesarios están presentes')
"
          fi
        env:
          TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}

  validar-linkedin:
    name: LinkedIn API
    runs-on: ubuntu-latest
    steps:
      - name: Verificar que los secrets existen
        run: |
          if [ -z "$TOKEN" ]; then
            echo "⚠️  LINKEDIN_ACCESS_TOKEN no configurado (puedes configurarlo después)"
          else
            echo "✅ LINKEDIN_ACCESS_TOKEN está configurado (${#TOKEN} caracteres)"
          fi
          if [ -z "$ORG_ID" ]; then
            echo "⚠️  LINKEDIN_ORG_ID no configurado"
          else
            echo "✅ LINKEDIN_ORG_ID configurado: $ORG_ID"
          fi
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}

      - name: Verificar acceso a la organización
        if: ${{ secrets.LINKEDIN_ACCESS_TOKEN != '' }}
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-Restli-Protocol-Version: 2.0.0" \
            "https://api.linkedin.com/v2/organizations/${ORG_ID}")

          if echo "$RESPONSE" | grep -q '"status"' && echo "$RESPONSE" | grep -q '401\|403'; then
            echo "❌ Token de LinkedIn inválido o sin permisos suficientes"
            exit 1
          elif echo "$RESPONSE" | grep -q '"localizedName"'; then
            ORG_NAME=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('localizedName','desconocido'))")
            echo "✅ LinkedIn conectado correctamente"
            echo "   Organización: $ORG_NAME"
          else
            echo "⚠️  Respuesta inesperada de LinkedIn API (normal si el token aún no tiene permisos de organización)"
          fi
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}

  validar-anthropic:
    name: Anthropic API (Claude Vision)
    runs-on: ubuntu-latest
    steps:
      - name: Verificar clave de Anthropic
        run: |
          if [ -z "$API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY no está configurado en GitHub Secrets"
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY está configurado (${#API_KEY} caracteres)"
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Probar conexión con Claude API
        run: |
          RESPONSE=$(curl -s \
            -H "x-api-key: ${API_KEY}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-haiku-4-5","max_tokens":10,"messages":[{"role":"user","content":"di ok"}]}' \
            "https://api.anthropic.com/v1/messages")

          if echo "$RESPONSE" | grep -q '"type":"message"'; then
            echo "✅ Anthropic API responde correctamente — Claude Vision listo para generar captions"
          else
            echo "❌ Error en Anthropic API:"
            echo "$RESPONSE" | python3 -c "import sys,json; e=json.load(sys.stdin).get('error',{}); print(f'  {e.get(\"message\",\"error desconocido\")}')" 2>/dev/null || echo "$RESPONSE"
            exit 1
          fi
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
