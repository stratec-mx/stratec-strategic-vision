name: Validar credenciales de redes sociales

on:
  workflow_dispatch:

jobs:
  facebook:
    name: Facebook API
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Verificar secrets configurados
        run: |
          OK=1
          if [ -z "$TOKEN" ]; then echo "FALTA: FACEBOOK_PAGE_ACCESS_TOKEN"; OK=0; else echo "OK: TOKEN configurado"; fi
          if [ -z "$PAGE_ID" ]; then echo "FALTA: FACEBOOK_PAGE_ID"; OK=0; else echo "OK: PAGE_ID=$PAGE_ID"; fi
          [ "$OK" -eq 1 ] || exit 1
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      - name: Probar Graph API
        run: |
          RESP=$(curl -sf "https://graph.facebook.com/v19.0/${PAGE_ID}?fields=id,name&access_token=${TOKEN}" || echo '{"error":{"message":"curl failed"}}')
          if echo "$RESP" | jq -e '.error' > /dev/null 2>&1; then echo "ERROR: $(echo "$RESP" | jq -r '.error.message')"; exit 1; fi
          echo "OK: $(echo "$RESP" | jq -r '.name')"
        env:
          TOKEN:   ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=Facebook API conectada" >> "$GITHUB_OUTPUT"
          else
            echo "status=ERROR" >> "$GITHUB_OUTPUT"
            echo "detalle=Secrets de Facebook invalidos o faltantes" >> "$GITHUB_OUTPUT"
          fi

  anthropic:
    name: Anthropic API
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Verificar ANTHROPIC_API_KEY
        run: |
          if [ -z "$KEY" ]; then echo "FALTA: ANTHROPIC_API_KEY"; exit 1; fi
          echo "OK: KEY configurado (${#KEY} chars)"
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Probar Claude API
        run: |
          RESP=$(curl -sf -H "x-api-key: ${KEY}" -H "anthropic-version: 2023-06-01" -H "content-type: application/json" -d '{"model":"claude-haiku-4-5","max_tokens":5,"messages":[{"role":"user","content":"ok"}]}' "https://api.anthropic.com/v1/messages" || echo '{"type":"error"}')
          if echo "$RESP" | jq -e '.type == "message"' > /dev/null 2>&1; then echo "OK: Claude listo"; else echo "ERROR: $(echo "$RESP" | jq -r '.error.message // "fallo"')"; exit 1; fi
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=Claude Vision listo para generar captions" >> "$GITHUB_OUTPUT"
          else
            echo "status=ERROR" >> "$GITHUB_OUTPUT"
            echo "detalle=ANTHROPIC_API_KEY invalido o faltante" >> "$GITHUB_OUTPUT"
          fi

  linkedin:
    name: LinkedIn API
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Verificar secrets LinkedIn
        run: |
          if [ -z "$TOKEN" ]; then echo "PENDIENTE: LINKEDIN_ACCESS_TOKEN"; else echo "OK: TOKEN configurado"; fi
          if [ -z "$ORG_ID" ]; then echo "PENDIENTE: LINKEDIN_ORG_ID"; else echo "OK: ORG_ID=$ORG_ID"; fi
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
      - name: Probar LinkedIn API
        run: |
          if [ -z "$TOKEN" ]; then echo "Saltando: sin token"; exit 0; fi
          RESP=$(curl -sf -H "Authorization: Bearer ${TOKEN}" -H "X-Restli-Protocol-Version: 2.0.0" "https://api.linkedin.com/v2/me" || echo '{"serviceErrorCode":0}')
          if echo "$RESP" | jq -e '.serviceErrorCode' > /dev/null 2>&1; then echo "ERROR: Token invalido"; exit 1; fi
          echo "OK: LinkedIn conectado"
        env:
          TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ -z "$TOKEN" ]; then
            echo "status=PENDIENTE" >> "$GITHUB_OUTPUT"
            echo "detalle=LinkedIn pendiente de configurar" >> "$GITHUB_OUTPUT"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=LinkedIn API conectada" >> "$GITHUB_OUTPUT"
          else
            echo "status=ERROR" >> "$GITHUB_OUTPUT"
            echo "detalle=Token LinkedIn invalido o expirado" >> "$GITHUB_OUTPUT"
          fi
        env:
          TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}

  emails:
    name: Verificar emails STRATEC
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.resultado.outputs.status }}
      detalle: ${{ steps.resultado.outputs.detalle }}
    steps:
      - name: Instalar herramientas
        run: sudo apt-get install -y dnsutils netcat-openbsd
      - name: Verificar MX stratecsecurity.com
        run: |
          MX=$(dig +short MX stratecsecurity.com)
          if [ -z "$MX" ]; then echo "ERROR: Sin registros MX"; echo "mx_ok=0" >> "$GITHUB_ENV"; else echo "OK: $MX"; echo "mx_ok=1" >> "$GITHUB_ENV"; fi
      - name: Verificar SMTP
        run: |
          MX_HOST=$(dig +short MX stratecsecurity.com | sort -n | head -1 | awk '{print $2}' | sed 's/\.$//')
          if [ -z "$MX_HOST" ]; then echo "AVISO: Sin servidor MX"; else
            if nc -z -w5 "$MX_HOST" 25 2>/dev/null; then echo "OK: Puerto 25 OK en $MX_HOST"
            elif nc -z -w5 "$MX_HOST" 587 2>/dev/null; then echo "OK: Puerto 587 OK en $MX_HOST"
            else echo "AVISO: Puertos SMTP bloqueados (normal en GitHub Actions)"; fi
          fi
      - name: Verificar SPF y DMARC
        run: |
          echo "SPF: $(dig +short TXT stratecsecurity.com | grep 'v=spf1' || echo 'no encontrado')"
          echo "DMARC: $(dig +short TXT _dmarc.stratecsecurity.com | grep 'v=DMARC1' || echo 'no encontrado')"
          echo "Cuentas: contacto@stratecsecurity.com, coordinacion@stratecsecurity.com"
      - name: Registrar resultado
        id: resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=OK" >> "$GITHUB_OUTPUT"
            echo "detalle=DNS OK. Cuentas contacto@ y coordinacion@ activas." >> "$GITHUB_OUTPUT"
          else
            echo "status=AVISO" >> "$GITHUB_OUTPUT"
            echo "detalle=Revisar DNS o MX de stratecsecurity.com" >> "$GITHUB_OUTPUT"
          fi

  notificar-telegram:
    name: Notificar por Telegram
    runs-on: ubuntu-latest
    needs: [facebook, anthropic, linkedin, emails]
    if: always()
    steps:
      - name: Enviar resumen a Telegram
        env:
          BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_STATUS:  ${{ needs.facebook.outputs.status }}
          FB_DETALLE: ${{ needs.facebook.outputs.detalle }}
          AN_STATUS:  ${{ needs.anthropic.outputs.status }}
          AN_DETALLE: ${{ needs.anthropic.outputs.detalle }}
          LI_STATUS:  ${{ needs.linkedin.outputs.status }}
          LI_DETALLE: ${{ needs.linkedin.outputs.detalle }}
          EM_STATUS:  ${{ needs.emails.outputs.status }}
          EM_DETALLE: ${{ needs.emails.outputs.detalle }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then echo "Sin secrets Telegram - saltando"; exit 0; fi
          FECHA=$(date '+%d/%m/%Y %H:%M')
          if [ "$FB_STATUS" = "OK" ]; then S_FB="OK"; else S_FB="ERROR"; fi
          if [ "$AN_STATUS" = "OK" ]; then S_AN="OK"; else S_AN="ERROR"; fi
          if [ "$LI_STATUS" = "OK" ]; then S_LI="OK"; elif [ "$LI_STATUS" = "PENDIENTE" ]; then S_LI="PENDIENTE"; else S_LI="ERROR"; fi
          if [ "$EM_STATUS" = "OK" ]; then S_EM="OK"; else S_EM="AVISO"; fi
          TEXT="STRATEC - Auditoria ${FECHA}%0AFacebook: ${S_FB} - ${FB_DETALLE}%0AAnthropic: ${S_AN} - ${AN_DETALLE}%0ALinkedIn: ${S_LI} - ${LI_DETALLE}%0ACorreos: ${S_EM} - ${EM_DETALLE}%0Ahttps://github.com/stratec-mx/stratec-strategic-vision/actions"
          curl -sf "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${TEXT}" || echo "AVISO: Telegram fallo"
